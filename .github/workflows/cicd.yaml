name: cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "COMMIT_ID=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/python-app:${{ env.COMMIT_ID }}
  


  cd:
    needs: ci
    runs-on: self-hosted

    steps:
      - name: Argocd app login
        shell: bash
        run: |
          argocd login argocd-server.argocd.svc.cluster.local:443 --insecure --grpc-web --username admin --password ${{ secrets.ARGOCD_PASSWORD }}

      - name: ArgoCD app sync
        shell: bash
        run: |
          argocd app sync python-app
     


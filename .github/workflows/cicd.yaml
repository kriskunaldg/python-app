name: cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      commit_id: ${{ env.COMMIT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "COMMIT_ID=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/python-app:${{ env.COMMIT_ID }}
  


  cd:
    needs: ci
    runs-on: arc-runner-set

    steps:


      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        shell: bash
        run: |
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/ releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Modify values file
        shell: bash
        run: |
          yq -i '.image.tag = "${{ needs.ci.outputs.commit_id }}"' \
            charts/python-app/values.yaml
          cat charts/python-app/values.yaml

      - name: Commit values.yaml
        uses: EndBug/add-and-commit@v9
        with:
          add: 'charts/python-app/values.yaml'
          message: 'Update image tag to ${{ needs.ci.outputs.commit_id }}'


      - name: Install argocd
        shell: bash
        run: |
          curl -ksSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv ./argocd /usr/local/bin/argocd

      - name: Argocd app login
        shell: bash
        run: |
          argocd login argocd-server.argocd.svc.cluster.local:443 --insecure --grpc-web --username admin --password ${{ secrets.ARGOCD_PASSWORD }}

      - name: ArgoCD app sync
        shell: bash
        run: |
          argocd app sync python-app

      
     

